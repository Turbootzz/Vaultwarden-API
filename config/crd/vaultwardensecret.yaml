---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: vaultwardensecrets.secrets.vaultwarden.io
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.3
spec:
  group: secrets.vaultwarden.io
  names:
    kind: VaultwardenSecret
    listKind: VaultwardenSecretList
    plural: vaultwardensecrets
    singular: vaultwardensecret
    shortNames:
      - vws
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Ready
          type: boolean
          jsonPath: .status.ready
        - name: Last Sync
          type: date
          jsonPath: .status.lastSyncTime
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          description: VaultwardenSecret syncs secrets from Vaultwarden into a Kubernetes Secret.
          properties:
            apiVersion:
              type: string
              description: >-
                APIVersion defines the versioned schema of this representation
                of an object.
            kind:
              type: string
              description: >-
                Kind is a string value representing the REST resource this
                object represents.
            metadata:
              type: object
            spec:
              type: object
              description: VaultwardenSecretSpec defines the desired state.
              required:
                - data
              properties:
                syncInterval:
                  type: string
                  description: >-
                    How often to re-sync from Vaultwarden. Must be a valid Go
                    duration string (e.g. "5m", "1h"). Defaults to "5m".
                  default: "5m"
                  minLength: 2
                data:
                  type: array
                  description: List of Vaultwarden items to fetch.
                  minItems: 1
                  items:
                    type: object
                    description: Maps a Kubernetes Secret key to a Vaultwarden item name.
                    required:
                      - key
                      - vaultwardenSecret
                    properties:
                      key:
                        type: string
                        description: Key name in the resulting Kubernetes Secret.
                        minLength: 1
                      vaultwardenSecret:
                        type: string
                        description: >-
                          Item name to look up in Vaultwarden
                          (case-insensitive, supports partial match).
                        minLength: 1
            status:
              type: object
              description: VaultwardenSecretStatus reflects the observed state.
              properties:
                ready:
                  type: boolean
                  description: Whether the secret has been successfully synced.
                lastSyncTime:
                  type: string
                  format: date-time
                  description: Timestamp of the last successful sync.
                lastSyncError:
                  type: string
                  description: Error message from the last failed sync.
                observedGeneration:
                  type: integer
                  format: int64
                  description: Most recent generation observed by the controller.
                conditions:
                  type: array
                  description: Latest available observations of the resource state.
                  items:
                    type: object
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    properties:
                      lastTransitionTime:
                        type: string
                        format: date-time
                      message:
                        type: string
                        maxLength: 32768
                      observedGeneration:
                        type: integer
                        format: int64
                        minimum: 0
                      reason:
                        type: string
                        maxLength: 1024
                        minLength: 1
                        pattern: '^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$'
                      status:
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      type:
                        type: string
                        maxLength: 316
                        pattern: '^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$'
                  x-kubernetes-list-map-keys:
                    - type
                  x-kubernetes-list-type: map
